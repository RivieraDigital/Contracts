name: Publish NuGet (GitHub Packages)

on:
  push:
    branches: [development, main, master]
    paths:
      - 'src/**'
      - '.github/workflows/publish-nuget.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  NUGET_FEED: https://nuget.pkg.github.com/RivieraDigital/index.json
  VERSION_PREFIX: 1.0

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Compute version
        id: version
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ] || [ "${{ github.ref }}" = "refs/heads/master" ]; then
            VERSION="${VERSION_PREFIX}.${{ github.run_number }}"
          else
            VERSION="${VERSION_PREFIX}.${{ github.run_number }}-dev"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION"

      - name: Restore
        run: |
          dotnet restore src/shared/Riviera.Shared.Contracts/Riviera.Shared.Contracts.csproj
          dotnet restore src/modules/Riviera.Modules.WebUsers.Contracts/Riviera.Modules.WebUsers.Contracts.csproj

      - name: Pack
        run: |
          dotnet pack src/shared/Riviera.Shared.Contracts/Riviera.Shared.Contracts.csproj \
            -c Release --no-restore -o ./nupkgs /p:Version=${{ steps.version.outputs.version }}
          dotnet pack src/modules/Riviera.Modules.WebUsers.Contracts/Riviera.Modules.WebUsers.Contracts.csproj \
            -c Release --no-restore -o ./nupkgs /p:Version=${{ steps.version.outputs.version }}

      - name: Push to GitHub Packages
        run: |
          for pkg in ./nupkgs/*.nupkg; do
            dotnet nuget push "$pkg" \
              --source "$NUGET_FEED" \
              --api-key "${{ secrets.GITHUB_TOKEN }}" \
              --skip-duplicate
          done

      - name: Summary
        run: |
          echo "## Published packages" >> $GITHUB_STEP_SUMMARY
          echo "Version: \`${{ steps.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Feed: $NUGET_FEED" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          ls -1 ./nupkgs/*.nupkg | xargs -n1 basename | sed 's/^/- /' >> $GITHUB_STEP_SUMMARY
